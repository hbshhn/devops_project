name: Weather App CI/CD

on:
  push:
    branches: [ "main" ] # Requirement: Trigger on push to main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Requirement: Automate Build Process & Docker Image Creation
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Replace 'yourusername' with your actual Docker Hub username
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/weather-app:latest

  deploy:
    needs: build-and-push # Only deploy if the build succeeds
    runs-on: ubuntu-latest
    steps:
      #  Deploy application to AWS EC2
      - name: SSH into EC2 and Update Container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull the latest image from Docker Hub
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/weather-app:latest
            
            # Stop and remove the old container if it exists
            sudo docker stop weather-app || true
            sudo docker rm weather-app || true
            
            # Run the new container
            # Mapping internal 5000 to external 80 so you can visit the IP directly
            sudo docker run -d --name weather-app -p 80:5000 ${{ secrets.DOCKERHUB_USERNAME }}/weather-app:latest
